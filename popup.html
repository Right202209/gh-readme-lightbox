<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 300px;
      padding: 20px;
      font: 14px/1.6 ui-sans-serif, system-ui, sans-serif;
      color: #f0f6fc;
      background: rgba(18, 22, 30, 0.96);
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
      opacity: 0.96;
    }

    label {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      cursor: pointer;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: background 0.15s;
    }

    label:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    input[type="checkbox"] {
      flex: none;
      margin-top: 3px;
      accent-color: #58a6ff;
      width: 16px;
      height: 16px;
    }

    .label-text {
      flex: 1;
      line-height: 1.5;
    }

    .label-desc {
      display: block;
      font-size: 12px;
      opacity: 0.6;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <h1>GitHub README Lightbox</h1>
  <label>
    <input type="checkbox" id="directOpenLink">
    <span class="label-text">
      当图片带有链接时，直接打开链接
      <span class="label-desc">开启后，点击带链接的图片将跳转到链接地址而非打开预览</span>
    </span>
  </label>
  <script src="popup.js"></script>
</body>
</html>
